<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de Modelos 3D</title>
    <style>
        :root {
            --control-bg: #2c2c2c;
            --control-fg: #ffffff;
            --accent-color: #007bff;
        }
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: var(--control-fg);
        }
        model-viewer {
            width: 100vw;
            height: 100vh;
            display: block;
            --progress-bar-height: 4px;
            --progress-bar-color: var(--accent-color);
            background: var(--control-bg);
        }
        
        .progress-bar {
            display: block;
            width: 100%;
            height: var(--progress-bar-height);
            max-width: 100%;
            position: absolute;
            left: 0;
            bottom: 0;
            border-radius: 0;
            transform-origin: left center;
            background: linear-gradient(to right, var(--progress-bar-color), #4a9eff);
            transition: transform 0.3s ease;
        }
        
        .error {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.2);
            color: var(--control-fg);
            padding: 1rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            border-radius: 4px;
            font-size: 0.875rem;
            max-width: 80%;
        }
        .controls {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background-color: var(--control-bg);
            border-radius: 8px;
            padding: 0.75rem;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .controls label {
            font-weight: 500;
        }
        .controls select {
            background-color: var(--control-bg);
            color: var(--control-fg);
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            padding: 0.5rem;
            cursor: pointer;
        }
    </style>
    <!-- Model Viewer -->
    <script type="module" src="https://unpkg.com/@google/model-viewer@3.4.0/dist/model-viewer.min.js"></script>
    
    <!-- Preload del modelo inicial -->
    <link rel="preload" href="models/model1.glb" as="fetch" crossorigin="anonymous">
</head>
<body>

    <div class="controls">
        <label for="model-select">Seleccionar modelo:</label>
        <select id="model-select">
            <option value="models/optimized/model1.glb">Modelo 1</option>
            <option value="models/optimized/model2.glb">Modelo 2</option>
            <option value="models/optimized/model3.glb">Modelo 3</option>
            <option value="models/model4.glb">Modelo 4</option>
            <option value="models/model5.glb">Modelo 5</option>
        </select>
    </div>

    <model-viewer 
        id="viewer"
        alt="Visor de modelos 3D"
        camera-controls 
        auto-rotate
        ar
        disable-zoom
        shadow-intensity="1"
        loading="eager"
        reveal="auto"
        disable-zoom>
        <div class="progress-bar" slot="progress-bar"></div>
        <div class="error" slot="error">Error al cargar el modelo 3D. Por favor, intente recargar la página o seleccione otro modelo.</div>
    </model-viewer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const viewer = document.getElementById('viewer');
            const select = document.getElementById('model-select');

            function handleModelError(event) {
                console.error('Error loading 3D model:', event.detail);
                viewer.classList.add('error');
            }

            function handleModelLoad() {
                viewer.classList.remove('error');
            }

            function loadModel(modelPath) {
                viewer.src = modelPath;
                viewer.classList.remove('error');
            }

            // Event listeners para el modelo
            viewer.addEventListener('error', handleModelError);
            viewer.addEventListener('load', handleModelLoad);

            // Cargar el modelo inicial
            loadModel(select.value);

            // Cambiar modelo
            select.addEventListener('change', (event) => {
                loadModel(event.target.value);
            });
        });
    </script>

</body>
</html>
